<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B Digital Gap Analyzer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #0056b3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px; margin-right: 10px;}
        button:hover { background-color: #004494; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .result-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #0056b3; }
        .header-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; flex-wrap: wrap; gap: 10px;}
        .data-box { background: #f9f9f9; padding: 15px; border: 1px solid #e1e1e1; border-radius: 5px; margin-bottom: 15px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;}
        h4 { margin-top: 0; color: #0056b3; margin-bottom: 10px;}
        ul { margin: 0; padding-left: 20px; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Digital Gap Analyzer v1.0</h2>
        <p>Paste up to 30 target company URLs (one per line):</p>
        <textarea id="urlsInput" placeholder="example.com&#10;anotherexample.co.za"></textarea>
        <div>
            <button onclick="startAnalysis()">Run Analysis</button>
            <button class="btn-success" onclick="copyAllData()">Copy All Results</button>
        </div>
        
        <div id="resultsContainer"></div>
    </div>

    <script>
        async function startAnalysis() {
            const urls = document.getElementById('urlsInput').value.split('\n').map(u => u.trim()).filter(u => u);
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ''; 

            for (let url of urls) {
                const cardId = 'card-' + btoa(url).replace(/=/g, '');
                container.innerHTML += `<div id="${cardId}" class="result-card">⏳ Pulling data for ${url}...</div>`;
                
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });
                    const data = await response.json();
                    
                    document.getElementById(cardId).innerHTML = `
                        <div class="header-row">
                            <span>🏢 ${data.company_name || url} | 🏭 ${data.sector || 'N/A'}</span>
                            <span>🌍 ${data.country || 'N/A'} | 📅 Est: ${data.established_year || 'N/A'} | 👥 ${data.employees || 'N/A'} | 💰 ${data.revenue || 'N/A'}</span>
                        </div>
                        
                        <div class="data-box">
                            <h4>Website Technical Analysis</h4>
                            <p><strong>Load Time:</strong> ${data.load_time} | <strong>SSL Encryption:</strong> ${data.ssl} | <strong>Copyright Year:</strong> ${data.copyright}</p>
                            <p><strong>Business Intelligence:</strong> ${data.bi_tools} | <strong>Sales/CRM Automation:</strong> ${data.crm}</p>
                            <p><strong>Social Media Links:</strong> ${data.socials} | <strong>Public Emails:</strong> ${data.emails}</p>
                        </div>

                        <div class="data-box">
                            <h4>Company Brief</h4>
                            <p>${data.brief || 'Data not found.'}</p>
                        </div>

                        <div class="grid-2">
                            <div class="data-box">
                                <h4>Sector Pain Points</h4>
                                <ul>${(data.sector_pain_points || ['N/A']).map(p => `<li>${p}</li>`).join('')}</ul>
                            </div>
                            <div class="data-box">
                                <h4>Company & Tech Pain Points</h4>
                                <ul>${(data.company_pain_points || ['N/A']).map(p => `<li>${p}</li>`).join('')}</ul>
                            </div>
                        </div>

                        <div class="data-box" style="background:#e8f4fd; border-color:#b8daff;">
                            <h4>Latest News / Context</h4>
                            <p>${data.latest_news || 'No recent news found.'}</p>
                        </div>
                    `;
                } catch (error) {
                    document.getElementById(cardId).innerHTML = `❌ Error analyzing ${url}. The website might be blocking the request.`;
                }
            }
        }

        function copyAllData() {
            const content = document.getElementById('resultsContainer').innerText;
            navigator.clipboard.writeText(content).then(() => {
                alert("Data copied! You can paste this directly into your final report or Excel.");
            });
        }
    </script>
</body>
</html>
