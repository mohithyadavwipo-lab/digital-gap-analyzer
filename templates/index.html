<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrightScope Enterprise Analyst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Core Industrial Theme */
        body { background: #f1f5f9; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; color: #0f172a; }
        
        /* Ultra-Premium Hero Section */
        .hero-section { background: linear-gradient(145deg, #020617 0%, #0f172a 100%); color: white; padding: 60px 0 70px 0; border-bottom: 2px solid #1e293b; box-shadow: 0 10px 40px rgba(2, 6, 23, 0.2); position: relative; z-index: 1; }
        .hero-title { font-weight: 900; letter-spacing: -1.5px; background: linear-gradient(90deg, #38bdf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2.8rem; }
        
        /* The Signature Glow */
        .crafted-by { display: inline-block; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(148, 163, 184, 0.2); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; color: #64748b; }
        .name-highlight { color: #f8fafc; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        /* Precision Cards */
        .enterprise-card { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 40px; box-shadow: 0 8px 30px rgba(15, 23, 42, 0.04); transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; z-index: 2; margin-top: -30px; margin-bottom: 30px; }
        
        /* Typography & Badges */
        .data-label { color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .data-value { font-size: 15px; font-weight: 600; color: #0f172a; }
        .badge-score { background: #f8fafc; color: #0f172a; border: 1px solid #cbd5e1; padding: 6px 18px; border-radius: 6px; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        
        /* Inner Industrial Boxes */
        .sector-box { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; height: 100%; transition: border-color 0.2s; }
        .sector-box:hover { border-color: #94a3b8; }
        .tech-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; border-left: 4px solid #3b82f6; }
        
        /* Pro-Grade Buttons */
        .btn-analyze { background: #0f172a; color: white; padding: 12px 30px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 6px; border: 1px solid #1e293b; box-shadow: 0 4px 15px rgba(15, 23, 42, 0.2); transition: all 0.2s; }
        .btn-analyze:hover { background: #1e293b; transform: translateY(-1px); color: white; }
        .btn-export { background: #ffffff; color: #0f172a; padding: 12px 30px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; border-radius: 6px; border: 1px solid #cbd5e1; box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: all 0.2s; }
        .btn-export:hover { border-color: #94a3b8; background: #f8fafc; color: #0f172a; }
        
        /* Input Field Styling */
        .form-control { border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #334155; }
        .form-control:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); background: #ffffff; }

        /* Dynamic Loaders */
        .loader-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 50px 0; }
        .spinner-ring { width: 45px; height: 45px; border-radius: 50%; border: 3px solid #e2e8f0; border-top-color: #3b82f6; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin-bottom: 25px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-title { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #0f172a; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-subtext { color: #64748b; font-size: 0.85rem; font-weight: 600; margin-top: 10px; }
        
        /* Cooldown States */
        .cooldown-ring { border-top-color: #f59e0b; }
        .cooldown-title { color: #d97706; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="container text-center">
            <h1 class="hero-title mb-2">BrightScope Enterprise Analyst</h1>
            <p class="text-light opacity-75 fs-5 mb-0 fw-light">Automated B2B Intelligence & Sales Engineering</p>
            <div class="crafted-by">
                Crafted by <span class="name-highlight">Ayushi</span> & <span class="name-highlight">Mohith</span>
            </div>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="enterprise-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="data-label m-0">Target Target URL Queue</span>
                    </div>
                    <textarea id="urlsInput" class="form-control mb-4 p-3" rows="5" placeholder="https://brightnodes.io/&#10;https://infosys.com/"></textarea>
                    <div class="d-flex justify-content-end gap-3">
                        <button id="exportBtn" class="btn-export" onclick="copyToExcel()">Copy the Output</button>
                        <button class="btn-analyze" onclick="startAnalysis()">Engage Deep Search</button>
                    </div>
                </div>

                <div id="resultsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        window.analyzedData = [];
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        function copyEmailDraft(btnElement) {
            const emailContainer = btnElement.closest('.mt-4').querySelector('.email-text-box');
            const textToCopy = emailContainer.innerText;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "COPIED ✓";
                setTimeout(() => { btnElement.innerText = originalText; }, 2000);
            });
        }

        async function startAnalysis() {
            const urls = document.getElementById('urlsInput').value.split('\n').filter(u => u.trim());
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';
            window.analyzedData = [];

            for (let i = 0; i < urls.length; i++) {
                let url = urls[i];
                const card = document.createElement('div');
                card.className = 'enterprise-card mt-0';
                container.appendChild(card);

                let success = false;
                let attempts = 0;
                let data = null;

                while (!success && attempts < 3) {
                    card.innerHTML = `
                        <div class="loader-wrapper">
                            <div class="spinner-ring"></div>
                            <div class="loading-title">Extracting Intelligence... ${attempts > 0 ? '(Retry ' + attempts + ')' : ''}</div>
                            <div class="loading-subtext">Bypassing firewalls & analyzing ${url}</div>
                        </div>
                    `;
                    
                    try {
                        const res = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({url})
                        });
                        data = await res.json();
                        
                        if (data.brief && (data.brief.includes('Quota exceeded') || data.brief.includes('high demand'))) {
                            card.innerHTML = `
                                <div class="loader-wrapper">
                                    <div class="spinner-ring cooldown-ring"></div>
                                    <div class="loading-title cooldown-title">API Server Busy</div>
                                    <div class="loading-subtext text-warning fw-bold">Cooling engine for 60 seconds before retrying. Do not close tab...</div>
                                </div>
                            `;
                            await sleep(60000); 
                            attempts++;
                            continue; 
                        }
                        success = true; 
                    } catch (e) {
                        card.innerHTML = `
                            <div class="loader-wrapper">
                                <div class="text-danger fw-bold fs-5 mb-2">Connection Severed</div>
                                <div class="text-muted small">Failed to process ${url}</div>
                            </div>
                        `;
                        break; 
                    }
                }

                if (success && data && !data.brief.includes('Quota exceeded') && !data.brief.includes('high demand')) {
                    data.scraped_url = url;
                    window.analyzedData.push(data);

                    const mailtoLink = `mailto:?subject=Strategic Partnership with ${encodeURIComponent(data.company_name)}&body=${encodeURIComponent(data.email_draft)}`;

                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-4">
                            <div>
                                <h3 class="fw-bold m-0" style="color: #0f172a; letter-spacing: -0.5px;">${data.company_name}</h3>
                                <a href="${url}" target="_blank" class="text-primary text-decoration-none small fw-semibold">${url}</a>
                            </div>
                            <span class="badge-score">MATCH SCORE: ${data.match_score}</span>
                        </div>
                        
                        <div class="mb-5">
                            <div class="data-label">Technical Infrastructure</div>
                            <div class="tech-box">
                                <div class="row g-3 text-muted small">
                                    <div class="col-md-4"><strong>Load Velocity:</strong> <span class="text-dark fw-bold">${data.load_time || 'N/A'}</span></div>
                                    <div class="col-md-4"><strong>SSL Encryption:</strong> <span class="text-dark fw-bold">${data.ssl || 'N/A'}</span></div>
                                    <div class="col-md-4"><strong>Copyright:</strong> <span class="text-dark fw-bold">${data.copyright || 'N/A'}</span></div>
                                    <div class="col-md-4"><strong>BI Analytics:</strong> <span class="text-dark fw-bold">${data.bi_tools || 'No'}</span></div>
                                    <div class="col-md-4"><strong>CRM Ecosystem:</strong> <span class="text-dark fw-bold">${data.crm || 'No'}</span></div>
                                    <div class="col-md-4"><strong>Outbound Vectors:</strong> <span class="text-dark fw-bold">${data.socials === 'Yes' || data.emails === 'Yes' ? 'Detected' : 'No'}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4 mb-5">
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Sector Category</div><div class="data-value">${data.sector}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Jurisdiction</div><div class="data-value">${data.country}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Headcount</div><div class="data-value">${data.employees}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Est. Revenue</div><div class="data-value">${data.revenue}</div></div></div>
                        </div>

                        <div class="mb-5">
                            <div class="data-label">Corporate Intelligence Profile</div>
                            <div class="p-4 border rounded-3 text-dark" style="background: #ffffff; font-size: 15px; line-height: 1.7; border-left: 4px solid #10b981;">${data.brief}</div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <div class="data-label">Macro Sector Vulnerabilities</div>
                                <div class="sector-box"><ul class="m-0 ps-3">${data.sector_pain_points.map(p => `<li class="text-muted small mb-2" style="line-height: 1.6;">${p}</li>`).join('')}</ul></div>
                            </div>
                            <div class="col-md-6">
                                <div class="data-label">Specific Organizational Pain Points</div>
                                <div class="sector-box"><ul class="m-0 ps-3">${data.company_pain_points.map(p => `<li class="text-muted small mb-2" style="line-height: 1.6;">${p}</li>`).join('')}</ul></div>
                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-top">
                            <div class="data-label">Market Context & Recent Catalysts</div>
                            <div class="text-dark" style="font-size: 14.5px; line-height: 1.6;">${data.latest_news}</div>
                        </div>

                        <div class="mt-5 pt-4 border-top">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="data-label m-0">SOP-Compliant Outreach Protocol</div>
                                <div class="gap-2 d-flex">
                                    <button class="btn btn-sm btn-light border fw-bold text-dark px-3" onclick="copyEmailDraft(this)" style="font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">Copy Text</button>
                                    <a href="${mailtoLink}" class="btn btn-sm text-white fw-bold px-3" style="background: #0f172a; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">Open Client</a>
                                </div>
                            </div>
                            <div class="p-4 bg-white border rounded-3 text-dark email-text-box" style="font-size: 14.5px; line-height: 1.8; white-space: pre-wrap; font-family: 'Segoe UI', system-ui, sans-serif; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">${data.email_draft}</div>
                        </div>
                    `;
                }

                if (i < urls.length - 1) {
                    await sleep(4000);
                }
            }
        }

        async function copyToExcel() {
            if (window.analyzedData.length === 0) {
                alert("The queue is empty. Please analyze some URLs first.");
                return;
            }

            const headers = [
                "Company Name", "Website URL", "Match Score", "Sector", "Country", 
                "Employees", "Revenue", "Company Profile", "Sector Pain Points", 
                "Company Pain Points", "Latest News", "Email Draft", "Load Time", "SSL", 
                "BI Tools", "CRM", "Socials/Emails"
            ];
            
            let tsvContent = headers.join("\t") + "\n";

            window.analyzedData.forEach(row => {
                const cleanStr = (str) => (str || "N/A").toString().replace(/\n/g, " ").replace(/\t/g, " ");
                const cleanArr = (arr) => Array.isArray(arr) ? arr.join(" | ") : cleanStr(arr);
                
                const rowData = [
                    cleanStr(row.company_name),
                    cleanStr(row.scraped_url),
                    cleanStr(row.match_score),
                    cleanStr(row.sector),
                    cleanStr(row.country),
                    cleanStr(row.employees),
                    cleanStr(row.revenue),
                    cleanStr(row.brief),
                    cleanArr(row.sector_pain_points),
                    cleanArr(row.company_pain_points),
                    cleanStr(row.latest_news),
                    cleanStr(row.email_draft), 
                    cleanStr(row.load_time),
                    cleanStr(row.ssl),
                    cleanStr(row.bi_tools),
                    cleanStr(row.crm),
                    (row.socials === 'Yes' || row.emails === 'Yes') ? 'Detected' : 'No'
                ];
                
                tsvContent += rowData.join("\t") + "\n";
            });

            try {
                await navigator.clipboard.writeText(tsvContent);
                const btn = document.getElementById('exportBtn');
                const originalText = btn.innerText;
                btn.innerText = "COPIED ✓";
                btn.style.background = "#10b981";
                btn.style.color = "white";
                btn.style.borderColor = "#10b981";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = ""; 
                    btn.style.color = "";
                    btn.style.borderColor = "";
                }, 3000);
                
            } catch (err) {
                console.error("Failed to copy data: ", err);
                alert("Clipboard access failed. Please try again.");
            }
        }
    </script>
</body>
</html>
