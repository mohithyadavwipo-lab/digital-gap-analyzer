<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BrightScope Enterprise Analyst</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .enterprise-card { background: white; border-radius: 12px; border: 1px solid #e0e6ed; padding: 30px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .data-label { color: #6c757d; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .data-value { font-size: 14px; font-weight: 600; color: #334155; }
        .btn-analyze { background-color: #2563eb; color: white; padding: 12px 25px; font-weight: 600; border-radius: 8px; border: none; }
        .btn-export { background-color: #10b981; color: white; padding: 12px 25px; font-weight: 600; border-radius: 8px; border: none; }
        .badge-score { background-color: #eff6ff; color: #2563eb; border: 1px solid #dbeafe; padding: 5px 15px; border-radius: 50px; font-weight: 600; }
        .sector-box { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; height: 100%; }
        .tech-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4 fw-bold text-dark">BrightScope Enterprise Analyst</h2>
        
        <div class="enterprise-card mb-4">
            <p class="text-muted small">Paste up to 50 company URLs below (one per line). The system will process them sequentially.</p>
            <textarea id="urlsInput" class="form-control mb-3" rows="5" placeholder="https://brightnodes.io/"></textarea>
            <div class="d-flex justify-content-end gap-2">
                <button class="btn-export" onclick="exportData()">Export All to CSV</button>
                <button class="btn-analyze" onclick="startAnalysis()">Analyze Queue</button>
            </div>
        </div>

        <div id="resultsContainer"></div>
    </div>

    <script>
        async function startAnalysis() {
            const urls = document.getElementById('urlsInput').value.split('\n').filter(u => u.trim());
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            for (let url of urls) {
                const card = document.createElement('div');
                card.className = 'enterprise-card mb-4';
                card.innerHTML = `<div class="text-center py-4">⏳ Processing deep search for ${url}...</div>`;
                container.appendChild(card);

                try {
                    const res = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({url})
                    });
                    const data = await res.json();

                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                            <h4 class="fw-bold m-0">${data.company_name} <span class="text-muted fs-6 fw-normal">(${url})</span></h4>
                            <span class="badge-score">Match Score: ${data.match_score}</span>
                        </div>
                        
                        <div class="mb-4">
                            <div class="data-label">Website Technical Analysis</div>
                            <div class="tech-box">
                                <div class="row g-2 text-muted small">
                                    <div class="col-md-4"><strong>Load Time:</strong> ${data.load_time || 'N/A'}</div>
                                    <div class="col-md-4"><strong>SSL Encryption:</strong> ${data.ssl || 'N/A'}</div>
                                    <div class="col-md-4"><strong>Copyright:</strong> ${data.copyright || 'N/A'}</div>
                                    <div class="col-md-4"><strong>Business Intelligence:</strong> ${data.bi_tools || 'No'}</div>
                                    <div class="col-md-4"><strong>Sales/CRM Automation:</strong> ${data.crm || 'No'}</div>
                                    <div class="col-md-4"><strong>Social & Emails:</strong> ${data.socials === 'Yes' || data.emails === 'Yes' ? 'Detected' : 'No'}</div>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Sector</div><div class="data-value">${data.sector}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Country of Origin</div><div class="data-value">${data.country}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Employees</div><div class="data-value">${data.employees}</div></div></div>
                            <div class="col-md-3"><div class="sector-box"><div class="data-label">Revenue</div><div class="data-value">${data.revenue}</div></div></div>
                        </div>

                        <div class="mb-4">
                            <div class="data-label">Company Profile</div>
                            <div class="p-3 bg-light rounded-3 text-muted" style="font-size: 14px; line-height: 1.6;">${data.brief}</div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="data-label">Sector Pain Points</div>
                                <div class="sector-box"><ul>${data.sector_pain_points.map(p => `<li class="text-muted small mb-2">${p}</li>`).join('')}</ul></div>
                            </div>
                            <div class="col-md-6">
                                <div class="data-label">Company Pain Points</div>
                                <div class="sector-box"><ul>${data.company_pain_points.map(p => `<li class="text-muted small mb-2">${p}</li>`).join('')}</ul></div>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 border-top">
                            <div class="data-label">Latest News / Market Context</div>
                            <div class="text-muted small">${data.latest_news}</div>
                        </div>
                    `;
                } catch (e) { card.innerHTML = `<div class="text-danger">Failed to process ${url}</div>`; }
            }
        }

        function exportData() {
            alert("Export functionality will be wired up after data review.");
        }
    </script>
</body>
</html>
